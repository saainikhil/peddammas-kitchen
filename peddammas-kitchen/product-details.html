<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Product Details — Peddamma’s Kitchen</title>
  <meta name="description" content="Product details and ordering options." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <meta name="theme-color" content="#FFF8F0">
</head>
<body>
  <div id="nav-placeholder"></div>
  <main class="container product-details">
    <div id="productDetails"></div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Render product based on ?id= query
    const params = new URLSearchParams(location.search);
    const id = params.get('id') || '1';
    const product = products.find(p=>p.id==id);
    const el = document.getElementById('productDetails');
    if(product){
      el.innerHTML = `
        <div class="detail-grid">
          <div class="img"><img src="${product.image}" alt="${product.name}" loading="lazy" decoding="async"></div>
          <div class="info">
            <h1 style="margin-top:0;font-family:'Playfair Display',serif">${product.name}</h1>
            <p class="price">₹${product.price}/kg</p>
            <p style="color:#564439">${product.description}</p>
            <h4>Ingredients</h4>
            <p>${product.ingredients}</p>
            <div class="qty" style="display:flex;gap:.5rem;align-items:center;margin-top:1rem">
              <button id="dec" class="btn">-</button>
              <input id="qty" value="1" style="width:64px;padding:.5rem;border-radius:8px;border:1px solid #eee;text-align:center" />
              <button id="inc" class="btn">+</button>
            </div>
            <div class="actions" style="margin-top:1rem;display:flex;gap:.6rem">
              <button class="btn primary" id="addCart">Add to Cart</button>
              <a class="btn" href="https://wa.me/918886880507?text=I%20want%20to%20order%20${encodeURIComponent(product.name)}" target="_blank">WhatsApp Order</a>
            </div>
            <div class="reviews" style="margin-top:1.2rem"><h4>Customer Reviews</h4><p>No reviews yet.</p></div>
          </div>
        </div>
        <section style="margin-top:2rem"><h3>Related Products</h3><div class="product-grid" id="related"></div></section>
      `;
      document.getElementById('inc').addEventListener('click',()=>document.getElementById('qty').value++);
      document.getElementById('dec').addEventListener('click',()=>{const q=document.getElementById('qty'); if(q.value>1) q.value--});
      // related
      const relatedEl = document.getElementById('related');
      products.filter(p=>p.id!==product.id).slice(0,3).forEach(p=>{ const c=document.createElement('article'); c.className='product-card'; c.innerHTML=`<img src="${p.image}" alt="${p.name}" loading="lazy" decoding="async"><div class="product-body"><h3>${p.name}</h3><p class="price">₹${p.price}/kg</p><a class="btn" href="product-details.html?id=${p.id}">View</a></div>`; relatedEl.appendChild(c) });
    } else { el.textContent = 'Product not found'; }
  </script>
</body>
</html>
